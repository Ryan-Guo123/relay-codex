<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Relay for Codex cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1"/>
      <stop offset="100%" stop-color="#fff1e3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111b34"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="chipWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="chipCool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7c2d12" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="104" r="168" fill="#fdba74" opacity="0.22"/>
  <circle cx="90" cy="562" r="190" fill="#14b8a6" opacity="0.06"/>

  <g transform="translate(82 82)">
    <rect width="86" height="86" rx="24" fill="#fff4e8"/>
    <path d="M21 60c0-19 15-34 34-34h18c10 0 18-8 18-18" fill="none" stroke="#0f172a" stroke-width="11" stroke-linecap="round"/>
    <path d="M89 22c0 18-15 33-34 33H37c-10 0-18 8-18 18" fill="none" stroke="#0f172a" stroke-width="11" stroke-linecap="round"/>
    <circle cx="21" cy="60" r="8" fill="#14b8a6"/>
    <circle cx="89" cy="22" r="8" fill="#f97316"/>
    <g transform="rotate(-34 55 43)">
      <rect x="40" y="16" width="30" height="56" rx="15" fill="#f97316"/>
      <rect x="40" y="16" width="30" height="16" rx="15" fill="#fdba74"/>
      <path d="M40 40h30" stroke="#0f172a" stroke-width="5" stroke-linecap="round" opacity="0.16"/>
    </g>
  </g>

  <text x="188" y="117" fill="#ea580c" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="4">RELAY FOR CODEX</text>
  <text x="82" y="232" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="60" font-weight="800">Keep Codex moving</text>
  <text x="82" y="296" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="60" font-weight="800">without losing state.</text>
  <text x="84" y="352" fill="#475569" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="23">Repo-local memory, verdict-based control,</text>
  <text x="84" y="384" fill="#475569" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="23">and recovery for long-running Codex App work.</text>

  <g transform="translate(84 432)" filter="url(#cardShadow)">
    <rect width="146" height="42" rx="21" fill="#dffaf6"/>
    <text x="28" y="27" fill="#0f766e" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700">continue</text>
    <rect x="164" width="176" height="42" rx="21" fill="#ffedd5"/>
    <text x="194" y="27" fill="#c2410c" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700">needs_review</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="790" y="74" width="330" height="214" rx="30" fill="url(#panel)"/>
  </g>
  <text x="822" y="118" fill="#fdba74" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="16" font-weight="700" letter-spacing="3">.RELAY / STATE SNAPSHOT</text>
  <rect x="822" y="138" width="266" height="42" rx="14" fill="#16233f"/>
  <circle cx="846" cy="159" r="7" fill="#2dd4bf"/>
  <text x="865" y="164" fill="#f8fafc" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="20" font-weight="700">state.md</text>
  <text x="985" y="164" fill="#94a3b8" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">continue</text>
  <rect x="822" y="189" width="266" height="42" rx="14" fill="#16233f"/>
  <circle cx="846" cy="210" r="7" fill="#fb923c"/>
  <text x="865" y="215" fill="#f8fafc" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="20" font-weight="700">queue.md</text>
  <text x="973" y="215" fill="#94a3b8" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">next step</text>
  <rect x="822" y="240" width="266" height="42" rx="14" fill="#16233f"/>
  <circle cx="846" cy="261" r="7" fill="#cbd5e1"/>
  <text x="865" y="266" fill="#f8fafc" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="20" font-weight="700">events.jsonl</text>
  <text x="975" y="266" fill="#94a3b8" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">activity log</text>

  <g filter="url(#cardShadow)">
    <rect x="734" y="326" width="410" height="206" rx="28" fill="#ffffff"/>
  </g>
  <text x="770" y="370" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="17" font-weight="700" letter-spacing="3">RECOVERY-FIRST AUTOMATION</text>

  <g transform="translate(770 396)">
    <circle cx="12" cy="12" r="12" fill="url(#chipCool)"/>
    <text x="38" y="18" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="24" font-weight="800">Project Relay</text>
    <text x="38" y="44" fill="#64748b" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">Create durable repo memory under `.relay/`.</text>
  </g>

  <g transform="translate(770 452)">
    <circle cx="12" cy="12" r="12" fill="url(#chipWarm)"/>
    <text x="38" y="18" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="24" font-weight="800">Progress Monitor</text>
    <text x="38" y="44" fill="#64748b" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">Detect drift, pauses, repeated failure, and churn.</text>
  </g>

  <g transform="translate(770 508)">
    <circle cx="12" cy="12" r="12" fill="#0f172a"/>
    <text x="38" y="18" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="24" font-weight="800">Automation Packs</text>
    <text x="38" y="44" fill="#64748b" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="15">Continue Working, Daily Triage, Stuck Recovery.</text>
  </g>
</svg>
