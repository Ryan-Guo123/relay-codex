<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Relay for Codex cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fffaf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#7c2d12" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="170" fill="#fdba74" opacity="0.22"/>
  <circle cx="160" cy="560" r="210" fill="#14b8a6" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="72" y="78" width="680" height="474" rx="34" fill="#0f172a"/>
  </g>

  <text x="128" y="166" fill="#fdba74" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="4">RELAY FOR CODEX</text>
  <text x="128" y="246" fill="#f8fafc" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="58" font-weight="800">Keep Codex moving</text>
  <text x="128" y="310" fill="#f8fafc" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="58" font-weight="800">without losing state.</text>
  <text x="128" y="372" fill="#cbd5e1" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26">Repo-local memory, verdict-based control, stuck recovery,</text>
  <text x="128" y="408" fill="#cbd5e1" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26">and Codex App automation packs for long-running work.</text>

  <g transform="translate(128 456)">
    <rect width="152" height="38" rx="19" fill="#14b8a6" opacity="0.15"/>
    <text x="28" y="25" fill="#5eead4" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700">continue</text>
    <rect x="172" width="142" height="38" rx="19" fill="#f97316" opacity="0.18"/>
    <text x="198" y="25" fill="#fdba74" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="700">needs_review</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="772" y="96" width="344" height="134" rx="26" fill="url(#card)"/>
    <rect x="772" y="248" width="344" height="134" rx="26" fill="url(#card)"/>
    <rect x="772" y="400" width="344" height="134" rx="26" fill="url(#card)"/>
  </g>

  <g transform="translate(804 128)">
    <circle cx="18" cy="18" r="18" fill="#14b8a6"/>
    <path d="M10 18h16" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
    <text x="52" y="20" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26" font-weight="800">Project Relay</text>
    <text x="52" y="52" fill="#475569" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18">Bootstraps `.relay/` and durable repo memory.</text>
  </g>

  <g transform="translate(804 280)">
    <circle cx="18" cy="18" r="18" fill="#fb923c"/>
    <path d="M18 10v16M10 18h16" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/>
    <text x="52" y="20" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26" font-weight="800">Progress Monitor</text>
    <text x="52" y="52" fill="#475569" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18">Tells Codex when to continue, pause, recover, or escalate.</text>
  </g>

  <g transform="translate(804 432)">
    <circle cx="18" cy="18" r="18" fill="url(#accent)"/>
    <path d="M10 18c4-6 12-10 20-10" fill="none" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/>
    <path d="M10 18c4 6 12 10 20 10" fill="none" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/>
    <text x="52" y="20" fill="#0f172a" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="26" font-weight="800">Automation Packs</text>
    <text x="52" y="52" fill="#475569" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="18">Continue Working, Daily Triage, and Stuck Recovery.</text>
  </g>
